<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語カードメーカー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>単語カードメーカー</h1>
        <button id="themeToggle" class="icon-btn">🌙</button>
    </header>

    <div class="card" id="card">単語を追加してね</div>

    <div class="controls">
        <button id="nextBtn">次へ</button>
        <button id="shuffleBtn">シャッフル</button>
        <button id="deleteAllBtn">全削除</button>
    </div>

    <div class="add-area">
        <input id="wordInput" placeholder="英語">
        <input id="meaningInput" placeholder="日本語">
        <button id="addBtn">追加</button>
    </div>

    <div class="import-export">
        <button id="exportBtn">JSONエクスポート</button>
        <button id="importBtn">JSONインポート</button>
        <input type="file" id="fileInput" style="display:none;">
    </div>

    <ul id="wordList"></ul>

    <script src="script.js"></script>
</body>
</html>
