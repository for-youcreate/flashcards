<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>単語カードメーカー｜英単語を覚える無料アプリ</title>

    <!-- meta description（SEO強化） -->
    <meta name="description" content="英単語を登録してカード形式で覚えられる無料アプリ。スマホ対応で、学習進捗を管理できる単語帳メーカー。高専生・学生・英語学習者におすすめ。">

    <!-- keywords（補助的SEO） -->
    <meta name="keywords" content="単語カード, 英単語, 単語帳, 英語学習, 無料アプリ, 高専, 学生, フラッシュカード">

    <!-- OGP設定 -->
    <meta property="og:title" content="単語カードメーカー｜無料で使える単語帳アプリ">
    <meta property="og:description" content="英単語を登録して、カード形式で覚えられる無料アプリ。スマホ対応。">
    <meta property="og:image" content="https://for-youcreate.github.io/flashcards/ogp.png">
    <meta property="og:url" content="https://for-youcreate.github.io/flashcards">
    <meta name="twitter:card" content="summary_large_image">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- 構造化データ（SEO強化） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "単語カードメーカー",
      "url": "https://for-youcreate.github.io/flashcards",
      "image": "https://for-youcreate.github.io/flashcards/ogp.png",
      "author": {
        "@type": "Person",
        "name": "祐政"
      },
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "description": "英単語を登録してカード形式で覚えられる無料アプリ。スマホ対応で、学習進捗を管理できる単語帳メーカー。"
    }
    </script>
</head>
<body>

    <header>
        <h1>単語カードメーカー</h1>
        <button id="themeToggle" class="icon-btn">🌙</button>
    </header>

    <div class="card" id="card">単語を追加してね</div>

    <div class="controls">
        <button id="nextBtn">次へ</button>
        <button id="shuffleBtn">シャッフル</button>
        <button id="deleteAllBtn">全削除</button>
    </div>

    <div class="add-area">
        <input id="wordInput" placeholder="英語">
        <input id="meaningInput" placeholder="日本語">
        <button id="addBtn">追加</button>
    </div>

    <div class="import-export">
        <button id="exportBtn">JSONエクスポート</button>
        <button id="importBtn">JSONインポート</button>
        <input type="file" id="fileInput" style="display:none;">
    </div>

    <ul id="wordList"></ul>

    <script src="script.js"></script>
</body>
</html>
