<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>単語カードメーカー</title>
  <meta name="description" content="自分だけの単語カードを作って、ブラウザでめくりながら暗記できるWebアプリ。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>単語カードメーカー</h1>
    <button id="themeToggle" class="small-btn">🌙 / ☀</button>
  </header>

  <main>
    <section class="card-section">
      <div id="card" class="card">読み込み中...</div>
      <div class="buttons">
        <button id="next">次へ</button>
        <button id="shuffle">シャッフル</button>
        <button id="resetAll">全削除</button>
      </div>
    </section>

    <section class="form-section">
      <h2>単語を追加</h2>
      <div class="add-form">
        <input id="frontInput" placeholder="英語">
        <input id="backInput" placeholder="日本語">
        <button id="addBtn">追加</button>
      </div>

      <div class="import-export">
        <button id="exportBtn" class="small-btn">JSONエクスポート</button>
        <label class="small-btn">
          JSONインポート
          <input type="file" id="importInput" accept="application/json" hidden>
        </label>
      </div>
    </section>

    <section class="list-section">
      <h2>単語リスト</h2>
      <ul id="wordList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
